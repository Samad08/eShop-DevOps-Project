name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Unit Tests
  # ──────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 7
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"

      - name: Restore dependencies
        run: dotnet restore src/eShopOnContainers-ServicesAndWebApps.sln

      - name: EventBus unit tests
        run: dotnet test src/BuildingBlocks/EventBus/EventBus.Tests/EventBus.Tests.csproj --no-restore --verbosity normal

      - name: Basket unit tests
        run: dotnet test src/Services/Basket/Basket.UnitTests/Basket.UnitTests.csproj --no-restore --verbosity normal

      - name: Catalog unit tests
        run: dotnet test src/Services/Catalog/Catalog.UnitTests/Catalog.UnitTests.csproj --no-restore --verbosity normal

      - name: Ordering unit tests
        run: dotnet test src/Services/Ordering/Ordering.UnitTests/Ordering.UnitTests.csproj --no-restore --verbosity normal

  # ──────────────────────────────────────────────
  # Job 2: Build & Push Docker images to GHCR
  # Only runs on push (not on PRs)
  # ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push (${{ matrix.image }})
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: basket.api
            dockerfile: src/Services/Basket/Basket.API/Dockerfile
          - image: catalog.api
            dockerfile: src/Services/Catalog/Catalog.API/Dockerfile
          - image: identity.api
            dockerfile: src/Services/Identity/Identity.API/Dockerfile
          - image: ordering.api
            dockerfile: src/Services/Ordering/Ordering.API/Dockerfile
          - image: ordering.backgroundtasks
            dockerfile: src/Services/Ordering/Ordering.BackgroundTasks/Dockerfile
          - image: ordering.signalrhub
            dockerfile: src/Services/Ordering/Ordering.SignalrHub/Dockerfile
          - image: payment.api
            dockerfile: src/Services/Payment/Payment.API/Dockerfile
          - image: webhooks.api
            dockerfile: src/Services/Webhooks/Webhooks.API/Dockerfile
          - image: mobileshoppingagg
            dockerfile: src/ApiGateways/Mobile.Bff.Shopping/aggregator/Dockerfile
          - image: webshoppingagg
            dockerfile: src/ApiGateways/Web.Bff.Shopping/aggregator/Dockerfile
          - image: webmvc
            dockerfile: src/Web/WebMVC/Dockerfile
          - image: webspa
            dockerfile: src/Web/WebSPA/Dockerfile
          - image: webstatus
            dockerfile: src/Web/WebStatus/Dockerfile
          - image: webhooks.client
            dockerfile: src/Web/WebhookClient/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: src
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:linux-latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:linux-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
