<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>eShopOnContainers DevOps Architecture Diagram</title>
<desc>Full architecture showing Proxmox VMs, Kubernetes clusters, microservices, CI/CD pipeline, monitoring stack, and nginx reverse proxy for Group 6 Jan 2026 cohort.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #1a1a1a; }
    .th  { font-size: 13px; font-weight: 600; }
    .ts  { font-size: 11px; font-weight: 400; fill: #444; }

    /* c-gray */
    .c-gray rect, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th { fill: #2C2C2A; }
    .c-gray .ts { fill: #5F5E5A; }

    /* c-blue */
    .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th  { fill: #0C447C; }
    .c-blue .ts  { fill: #185FA5; }

    /* c-teal */
    .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th  { fill: #085041; }
    .c-teal .ts  { fill: #0F6E56; }

    /* c-coral */
    .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th  { fill: #712B13; }
    .c-coral .ts  { fill: #993C1D; }

    /* c-amber */
    .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th  { fill: #633806; }
    .c-amber .ts  { fill: #854F0B; }

    /* c-purple */
    .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th  { fill: #3C3489; }
    .c-purple .ts  { fill: #534AB7; }

    /* c-green */
    .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th  { fill: #27500A; }
    .c-green .ts  { fill: #3B6D11; }

    .arr { fill: none; stroke: #888780; stroke-width: 1.2; marker-end: url(#arrow); }
  </style>
</defs>

<!-- ── TITLE ── -->
